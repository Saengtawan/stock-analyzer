# VIX Adaptive Strategy v3.0 Configuration
# Last Updated: 2026-02-11
# Backtest Validated: 2020-2024 (5 years, +149% return, 20% CAGR)

version: "3.0"

# VIX Tier Boundaries (OPTIMIZED from backtest)
# DO NOT CHANGE without re-backtesting
boundaries:
  normal_max: 20   # VIX < 20: NORMAL tier
  skip_max: 24     # VIX 20-24: SKIP tier
  high_max: 38     # VIX 24-38: HIGH tier
                   # VIX > 38: EXTREME tier

# Tier-Specific Strategies
tiers:
  # NORMAL Tier (VIX < 20): Mean Reversion
  normal:
    strategy: mean_reversion

    # Entry filters
    min_score: 90  # Will be adjusted dynamically (70-90 based on regime)
    min_dip_yesterday: -1.0  # Must have dipped at least 1% yesterday

    # Position management
    max_positions: 3
    position_sizes: [40, 40, 20]  # % of capital by score rank

    # Risk management
    stop_loss_range: [2.0, 4.0]  # ATR-based, capped to this range
    trail_activation_pct: 2.0    # Activate trailing at +2%
    trail_lock_pct: 75           # Lock 75% of gains
    max_hold_days: 10            # Time exit after 10 days

  # HIGH Tier (VIX 24-38): Bounce Strategy
  high:
    strategy: bounce

    # Entry filters
    min_score: 85
    bounce_type: gain_2d_1.0       # Must gain 1% over 2 days (bounce confirmation)
    dip_requirement: dip_3d_-3     # Must have dipped -3% from 3-day high
    vix_condition: falling_1d      # CRITICAL: VIX must be falling

    # Position management
    max_positions: 1               # Only 1 position at high VIX
    position_sizes: [100]          # 100% of allocation

    # Risk management
    stop_loss_range: [3.0, 6.0]    # Wider for volatility
    use_trailing: false            # No trailing stop (avoids whipsaw)
    max_hold_days: 10              # Time exit after 10 days

# Adaptive Score Threshold
# CRITICAL: Score formula is bull-market biased
# Without adaptation: Fixed 90 → only 0.3% signals in bear markets
# With adaptation: Adjusts to market regime → consistent trade frequency
score_adaptation:
  enabled: true
  method: vix_based  # Options: 'vix_based', 'percentile'

  # Thresholds by regime (for vix_based method)
  thresholds:
    bull: 90     # VIX < 15
    normal: 80   # VIX 15-20
    bear: 70     # VIX > 20

  # Alternative: Percentile-based (if method: percentile)
  # percentile: 70  # Top 30% of scores

# Data Configuration
data:
  vix_symbol: "^VIX"
  cache_duration_hours: 1
  lookback_days: 365

# Logging
logging:
  log_tier_transitions: true
  log_vix_extreme: true
  log_score_threshold_changes: true

# Alerts
alerts:
  vix_extreme_threshold: 38
  drawdown_alerts: [3, 6, 10, 15, 20]  # Alert at these DD levels
  min_win_rate_alert: 45  # Alert if rolling 20-trade win rate < 45%

# Paper Trading Requirements (MUST pass before live)
paper_trading:
  min_duration_days: 30
  min_trades: 10
  required_win_rate: 45  # Rolling 20-trade minimum
  max_losing_streak: 7
  max_entry_miss_rate: 15  # % of signals that couldn't be filled
  max_drawdown: 20  # % max acceptable DD

# Notes for Implementation
# 1. Always check VIX direction for HIGH tier - this is THE critical filter
# 2. Adapt score threshold to market regime - fixed threshold fails
# 3. EXTREME tier (VIX > 38) must close ALL positions immediately
# 4. SKIP tier (VIX 20-24) no new trades - nothing works in this zone
# 5. Paper trade for 30+ days minimum before going live
