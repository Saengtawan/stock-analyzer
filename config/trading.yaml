# =============================================================================
# RAPID TRADER CONFIGURATION v6.2.0 — STOCK QUALITY FILTERS
# =============================================================================
# Edit this file to change trading parameters without modifying code.
# Changes are loaded on engine start. Use /api/config/reload for hot-reload.
#
# IMPORTANT: Do not commit this file with production API keys!
# =============================================================================

# =============================================================================
# RAPID ROTATION STRATEGY — UNIFIED CONFIGURATION (v6.7)
# =============================================================================
# Single source of truth for core Rapid Rotation strategy parameters.
# Components load this section via RapidRotationConfig.from_yaml()
# =============================================================================

rapid_rotation:
  # -- Stop Loss / Take Profit (v6.33: Optimized for win rate) --
  atr_sl_multiplier: 1.5      # SL = 1.5 × ATR
  atr_tp_multiplier: 3.0      # TP = 3 × ATR (note: existing config uses 3.5)
  min_sl_pct: 3.0             # v6.33: Tightened 4.0→3.0 (faster rotation, limit losses)
  max_sl_pct: 4.0             # v6.33: Tightened 5.0→4.0 (cap max loss)
  min_tp_pct: 8.0             # v6.33: Raised 6.0→8.0 (better risk:reward ratio)
  max_tp_pct: 12.0            # v6.33: Raised 10.0→12.0 (capture bigger moves)
  default_sl_pct: 3.5         # v6.33: Tightened 4.5→3.5 (standard protection)
  default_tp_pct: 10.0        # v6.33: Raised 7.0→10.0 (target larger gains)

  # -- Trailing Stop --
  trail_activation_pct: 2.0   # v6.33: Earlier 2.5→2.0 (lock profits sooner)
  trail_lock_pct: 80.0        # Lock 80% of peak gains (note: existing uses 75%)

  # -- Position Management --
  max_positions: 2            # v6.31: 3→2 for $5k account (DIP-bounce strategy only)
  max_positions_total: 5      # v6.53: 4→5 (2 DIP + 1 OVN + 1 PEM + 1 PED)
  max_hold_days: 7            # v6.33: Reduced 10→7 (faster rotation for fresher signals)
  position_size_pct: 30.0     # v6.31: 42→30 for $5k account (2×30%=60%, leaves room for overnight)
  max_position_pct: 45.0      # Max position size (% of equity)

  # -- Scoring & Filtering --
  min_score: 80               # v6.33: Raised 70→80 (higher quality signals, +7-10% WR)
  min_atr_pct: 3.0            # v6.32: 2.5→3.0 for consistency with beta_filter
  momentum_5d_min_dip: -1.0   # Must have dipped at least -1.0% (block shallow dips like -0.79%)
  momentum_5d_max_dip: -15.0  # Max dip allowed -15% (block crashed stocks)
  momentum_5d_deep_dip_threshold: -3.0  # v6.55: If dip deeper than this, require oversold RSI
  momentum_5d_deep_dip_rsi_max: 45.0   # v6.55: Max RSI for deep dip (ETN=56 blocked, legit=35 passes)

  # -- Regime Filtering --
  regime_filter_enabled: true # Enable SPY regime filter
  regime_sma_period: 20       # SMA period for regime check

  # -- Dynamic Sector Refresh (v6.20) --
  sector_vix_threshold: 20.0        # VIX > 20 = volatile market
  sector_ttl_volatile_min: 2        # Sector refresh TTL when volatile (minutes)
  sector_ttl_normal_min: 5          # Sector refresh TTL when normal (minutes)
  sector_vix_cache_ttl_sec: 60      # Cache VIX value for N seconds (balance freshness vs API calls)

  # -- Sector Scoring --
  sector_bull_threshold: 3.0  # > +3% = BULL sector
  sector_bear_threshold: -3.0 # < -3% = BEAR sector
  sector_bull_bonus: 0        # Bonus points for BULL sector (disabled)
  sector_bear_penalty: 0      # Penalty for BEAR sector (disabled)
  sector_sideways_adj: 0      # Adjustment for SIDEWAYS sector

  # -- Alternative Data --
  alt_data_max_bonus: 15      # Max bonus from alt data
  alt_data_max_penalty: -15   # Max penalty from alt data

  # -- Safety & Risk Management --
  daily_loss_limit_pct: 5.0   # Daily loss limit (% of equity, note: existing uses 3.0)
  min_buying_power_pct: 10.0  # Min buying power to keep (%)

  # -- PDT Settings --
  pdt_account_threshold: 25000.0  # PDT threshold ($)
  pdt_day_trade_limit: 3          # Max day trades (non-PDT)
  pdt_reserve: 1                  # Keep N day trades for emergencies (v6.10.1)
  pdt_enforce_always: true        # Enforce PDT rules always

  # -- SPY Intraday Filter (block new entries when SPY already selling off) --
  spy_intraday_filter_enabled: true
  spy_intraday_filter_pct: -1.5   # PHASE 2 FIX: Block if SPY down >1.5% from today's open (prevents Feb 11-12 scenario)

  # -- VIX Spike Protection (tighten SLs when VIX jumps sharply) --
  vix_spike_protection_enabled: true
  vix_spike_pct: 15.0             # Trigger if VIX up >15% vs yesterday close
  vix_spike_sl_tighten_pct: 1.0  # Tighten SL to N% below current price

  # -- Circuit Breaker --
  max_consecutive_losses: 5       # Circuit breaker trigger (note: existing uses 3)
  circuit_breaker_pause_hours: 1  # Pause duration after breaker

  # -- Market Hours --
  market_open_hour: 9         # Market open hour (ET)
  market_open_minute: 30      # Market open minute
  market_close_hour: 16       # Market close hour (ET)
  market_close_minute: 0      # Market close minute
  pre_close_minute: 50        # Pre-close check (15:50 ET)

  # -- Skip Window (v6.36: No trading period to avoid volatile mid-morning) --
  skip_window_enabled: true   # Enable skip window (block all trading during this period)
  skip_window_start_hour: 10  # Skip window start hour (ET)
  skip_window_start_minute: 0 # Skip window start minute
  skip_window_end_hour: 11    # Skip window end hour (ET)
  skip_window_end_minute: 0   # Skip window end minute

  # -- 4-Layer Entry Protection (v6.23: Adaptive Timing) --
  entry_protection_enabled: true           # Master switch for entry protection
  entry_block_minutes_after_open: 0        # Layer 1: DISABLED - no time block after open

  # Adaptive Timing (v6.23): Different block times based on gap %
  entry_adaptive_timing_enabled: true      # Enable gap-based adaptive timing
  entry_adaptive_gap_down_strong_minutes: 5   # Gap < -1.5%: Buy early (bottom fishing)
  entry_adaptive_gap_down_mild_minutes: 10    # Gap -1.5% to -0.5%: Wait a bit
  entry_adaptive_flat_minutes: 15             # Gap -0.5% to +0.5%: Standard protection
  entry_adaptive_gap_up_minutes: 20           # Gap > +0.5%: Wait for pullback

  entry_allow_discount_exception: true     # Allow if price drops 0.5% from signal
  entry_discount_exception_pct: -0.5       # Exception threshold
  entry_vwap_max_distance_pct: 3.0         # PHASE 1 FIX: Increased from 1.5 (was rejecting AA at 1.55%)
  entry_vwap_allow_below: true             # Always allow if below VWAP
  entry_limit_order_only: true             # Layer 3: Use limit orders only
  entry_max_chase_pct: 0.8                 # PHASE 1 FIX: Increased from 0.2 (was rejecting WEX, STX)
  entry_limit_timeout_minutes: 5           # Cancel limit order after timeout

  # Layer 4: Intraday Position Filter (v6.22)
  entry_intraday_max_range_pct: 80.0       # Block if in top 20% of day's range
  entry_intraday_max_move_from_low: 2.5    # Block if moved > 2.5% from day's low
  entry_intraday_strict_after_minutes: 120 # Stricter after 2 hours

  entry_track_rejections: true             # Track rejection statistics

  # -- Cache Settings --
  sector_cache_ttl_days: 3    # Sector cache TTL (days)
  price_cache_ttl_seconds: 300 # Price cache TTL (seconds)

# =============================================================================
# LEGACY SETTINGS (v6.2.0 and earlier)
# =============================================================================
# These settings are kept for backward compatibility with existing features.
# New code should use the rapid_rotation section above.
#
# v6.35: Removed all duplicates. Legacy section now contains ONLY:
#   - Backward compatibility settings (max_positions, position_size_pct, simulated_capital)
#   - Feature-specific settings NOT in rapid_rotation (risk_parity, weekly_loss, etc.)
# All core trading parameters moved to rapid_rotation section.
# =============================================================================

# -- Position Management --
max_positions: 2               # v6.31: 3→2 for $5k account (adaptive with overnight gap)
position_size_pct: 30          # v6.31: 42→30 for $5k account (leaves room for overnight)
simulated_capital: 5000        # v6.30: 4000→5000 (updated capital)

# -- Risk-Parity Sizing (v4.9) -- Legacy feature-specific settings
risk_parity_enabled: true      # Keep risk parity enabled for safety
risk_budget_pct: 2.5           # Max risk per position = 2.5% of account (was 1.0)

# -- Risk Limits -- Legacy-only settings (non-duplicates)
weekly_loss_limit_pct: 7.0     # Weekly loss limit (% of equity)
pdt_tp_threshold: 8.0          # PDT mode TP threshold
trail_enabled: true            # v6.0: ENABLED (backtest: +2%/60% optimal)

# -- Stock Quality Filters (v6.2) --
max_rsi_entry: 65              # Block RSI > 65 (backtest: only 20% WR)
avoid_mom_range: [10, 12]      # Skip momentum 10-12% (backtest: 33% WR)

# -- Signal Queue (v4.1) --
queue_enabled: true
queue_atr_mult: 0.5
queue_min_deviation: 0.5
queue_max_deviation: 1.5
queue_max_size: 3
queue_freshness_window: 30     # minutes
queue_rescan_on_empty: true

# -- Sector Diversification (v4.7) --
sector_filter_enabled: true
max_per_sector: 2
sector_loss_tracking_enabled: true
max_sector_consecutive_loss: 2
sector_cooldown_days: 2

# -- Dynamic Sector Gate (VIX-based quota) --
# Reduces max_per_sector when VIX is elevated to cut correlated risk
dynamic_sector_gate_enabled: true
sector_gate_normal_max: 2   # VIX < 20 (NORMAL): allow 2 per sector
sector_gate_skip_max: 1     # VIX 20-24 (SKIP): tighten to 1 per sector
sector_gate_high_max: 1     # VIX 24-38 (HIGH): stay tight
sector_gate_extreme_max: 0  # VIX > 38 (EXTREME): no new positions (closes all)

# -- Smart Order (v4.8) --
smart_order_enabled: true
smart_order_max_spread_pct: 1.0
smart_order_wait_seconds: 30

# -- Gap Filter (v4.3) --
gap_filter_enabled: true
gap_max_up: 2.0
gap_max_down: -5.0

# -- Earnings Filter (v4.4) --
earnings_filter_enabled: true
earnings_skip_days_before: 5
earnings_skip_days_after: 0
earnings_no_data_action: warn  # allow, skip, warn
earnings_auto_sell: true       # Auto-sell before earnings
earnings_auto_sell_buffer_min: 30  # Minutes before close

# -- Low Risk Mode (v4.5) --
low_risk_mode_enabled: true
low_risk_gap_max_up: 1.0       # % - gap filter for low risk mode
low_risk_min_score: 90         # v4.9.7: 85→90 (balance: stricter than BEAR=85, looser than NORMAL=95)
low_risk_position_size_pct: 30 # v6.31: 40→30 for $5K account (2 pos × 30% = 60%, consistent with main strategy)
low_risk_max_atr_pct: 4.0

# -- Afternoon Scan (v4.9.1) --
afternoon_scan_enabled: true
afternoon_scan_hour: 14
afternoon_scan_minute: 0
afternoon_min_score: 87        # v5.4: 82→87 (stricter than min_score=85)
afternoon_gap_max_up: 1.5      # tighter than morning
afternoon_gap_max_down: -3.0   # tighter than morning

# -- Market Hours (v6.4 Single Source of Truth) --
market_open_minutes: 570                   # 09:30 ET = 9*60+30
market_close_minutes: 960                  # 16:00 ET = 16*60

# -- Session Timeline (v6.4 Single Source of Truth) --
# UI timeline bar uses these values. All times in minutes from midnight.
sessions:
  gapscan:                                 # v6.11: Pre-market gap scanner
    start: 360                             # 06:00 ET
    end: 575                               # 09:35 ET
    interval: -1                           # Once per day (not continuous)
    label: "Gap Scan"
  morning:
    start: 575                             # 09:35 ET
    end: 660                               # 11:00 ET
    interval: 3                            # Volatile: scan every 3 min
    label: "Morning"
  midday:
    start: 660                             # 11:00 ET
    end: 840                               # 14:00 ET
    interval: 5                            # Normal: scan every 5 min
    label: "Midday"
  afternoon:
    start: 840                             # 14:00 ET
    end: 930                               # 15:30 ET
    interval: 5
    label: "Afternoon"
  preclose:
    start: 930                             # 15:30 ET
    end: 960                               # 16:00 ET
    interval: 0                            # No continuous scan
    label: "Pre-Close"

# -- Continuous Scan (v6.3) --
continuous_scan_enabled: true  # v6.17: RE-ENABLED after fixing WebSocket leak
continuous_scan_interval_minutes: 5        # v6.19: Faster (10→5) to catch more opportunities
continuous_scan_volatile_interval: 5       # v6.17: Slower (was 3) to reduce load
continuous_scan_volatile_end_hour: 11      # Volatile period ends at 11:00
continuous_scan_midday_hour: 12            # Switch to afternoon params after this hour

# -- Dynamic Scan (v6.18) --
continuous_scan_dynamic_enabled: true      # Enable VIX-based dynamic interval
continuous_scan_vix_threshold: 20.0        # VIX > 20 = volatile → 5 min, VIX < 20 = calm → 10 min
continuous_scan_dynamic_volatile_interval: 5    # Interval when VIX > threshold
continuous_scan_dynamic_calm_interval: 5        # Interval when VIX < threshold (user requested: always 5 min)

# -- Late Start Protection (v4.4) --
late_start_protection: true
market_open_scan_delay: 5      # minutes after open before scanning
market_open_scan_window: 20    # minutes - skip scan if started after this

# -- Monitor interval --
monitor_interval_seconds: 15

# -- Circuit breaker --
circuit_breaker_max_errors: 5

# -- Slippage tracking --
max_slippage_pct: 0.5

# -- Market Regime Filter (v4.9) --
regime_filter_enabled: true
regime_sma_period: 20
regime_rsi_min: 40
regime_return_5d_min: -2.0
regime_vix_max: 30.0               # v6.0: 100→30 (CRITICAL: VIX<30 filter = BEAR survival +109%)
vix_skip_zone_enabled: true        # v6.24: Block buys in VIX 20-24 only when VIX RISING (28% win) — allow when FALLING (46.8% win)
vix_skip_zone_low: 20.0            # VIX Adaptive SKIP tier lower bound
vix_skip_zone_high: 24.0           # VIX Adaptive SKIP tier upper bound
opening_window_limit_enabled: true  # v6.24: Stagger buys during first 30 min (9:30-10:00 ET)
opening_window_minutes: 30          # Duration of opening window (minutes after open)
opening_window_stagger_minutes: 15  # v6.35: Stagger gap - wait N minutes between buys in opening window
skip_before_holiday: true          # v4.7: Skip new positions before long weekends/holidays

# -- BEAR Mode Params (v4.9.4: relaxed — conviction sizing handles risk) --
bear_mode_enabled: true
bear_max_positions: 2
bear_min_score: 85                 # v4.9.4: 98→85
bear_gap_max_up: 1.5               # v4.9.4: 1.0→1.5
bear_gap_max_down: -3.0            # v4.9.4: -2.0→-3.0
bear_position_size_pct: 30         # v6.31: 45→30 for $5K account (2×30%=60%, leaves room for overnight)
bear_max_atr_pct: 4.0              # v4.9.4: 3.0→4.0

# -- BULL Sector Filter (v4.9.3) --
bull_sector_filter_enabled: true
bull_sector_min_return: -3         # Absolute: block sector if return_20d < -3% (sector BEAR)
sector_weak_relative_n: 2          # Relative: also block bottom N sectors by 20d return (0=disable)

# -- Quant Research Findings (v5.3) --
stock_d_filter_enabled: false      # PHASE 1 FIX: DISABLED (40% accuracy, rejecting winners)
bear_dd_control_exempt: true       # Don't apply DD controls in BEAR

# =============================================================================
# v4.9.4 — AGGRESSIVE SWING MODE
# =============================================================================

# -- Conviction-Based Sizing (Step 2) --
conviction_sizing_enabled: true
conviction_a_plus_pct: 45      # STRONG BULL + insider + score 85+
conviction_a_pct: 40           # BULL + score 80+
conviction_b_pct: 30           # SIDEWAYS + score 80+

# -- Smart Day Trade (Step 3) --
smart_day_trade_enabled: true
day_trade_gap_threshold: 3.0   # % gap up at open to trigger day trade sell
day_trade_momentum_threshold: 4.0  # % intraday gain to trigger
day_trade_emergency_enabled: true   # use day trade for emergency SL

# -- Overnight Gap Scanner (Step 6) --
# ENABLED 2026-02-20: Adaptive allocation strategy for $5k account
# Uses ALL remaining cash after dip-bounce positions (adaptive 40-70%)
# Backtest 2023-2025: 100% WR, 57 events, +13.29% monthly, +163.44% total return
# v6.34: DEDICATED SLOT - Overnight always gets 1 position regardless of dip-bounce count
overnight_gap_enabled: true
overnight_gap_scan_hour: 15
overnight_gap_scan_minute: 30
overnight_gap_min_score: 80             # v6.33: Raised 70→80 (match dip-bounce quality)
overnight_gap_position_pct: 100         # v6.31: 35→100 (use all remaining cash)
overnight_gap_max_pct_of_capital: 70    # v6.31: Safety cap at 70% of total capital
overnight_gap_min_cash: 500             # v6.31: Skip if available cash < $500
overnight_gap_max_positions: 1          # v6.34: Dedicated slot (not counted in dip-bounce limit)
overnight_gap_target_pct: 3.0
overnight_gap_sl_pct: 1.5

# -- Breakout Scanner (Step 7) --
# DISABLED 2026-02-18: Backtest shows -0.413% expectancy (no edge, hurts portfolio)
breakout_scan_enabled: false

# -- Post-Earnings Momentum (PEM) Strategy (Step 8) --
# Backtest (2023-2025): WR 57.6%, avg +3.24%, ~2.3 events/month → ~$396/month on $25k
# Entry: Buy at open when stock gaps up 8%+ with high volume (earnings catalyst)
# Exit: Same-day at market close (gap_trade=True → pre_close_check EOD exit)
pem_enabled: true                # Enabled 2026-02-18
pem_gap_threshold_pct: 8.0       # Minimum gap up % from prev close to open
pem_volume_early_ratio_min: 0.15 # Min early-session vol ratio vs 20d avg (at 9:35, 15% = ~2-3x by EOD)
pem_scan_hour: 9                 # Scan at 9:35 ET (when open prices confirmed)
pem_scan_minute: 35
pem_max_positions: 1             # Max PEM positions at once (1-day hold, high conviction)
pem_position_size_pct: 30.0      # v6.32: 42→30 for $5k account consistency
pem_sl_pct: 5.0                  # Stop loss % (wider for volatile earnings day)
breakout_min_volume_mult: 1.5
breakout_min_score: 75
breakout_target_pct: 8.0
breakout_sl_pct: 3.0

# =============================================================================
# v6.2 — PRE-FILTER SYSTEM
# =============================================================================
# Scans full universe (~1,000+ stocks) during market close hours
# to create filtered pool (~200-400 stocks) for fast realtime scanning.

# -- Pre-Filter Settings --
pre_filter_enabled: true
pre_filter_min_price: 5.0          # Minimum stock price
pre_filter_min_volume: 500000      # Minimum average volume (fallback)
pre_filter_min_atr_pct: 2.5        # v6.32: Adjusted 2.0→2.5 (slightly lower than strategy 3.0 for wider net)
pre_filter_max_overextended: 12.0  # v6.27: Relaxed 10→12% for bull markets
pre_filter_pool_stale_hours: 12    # Hours before pool considered stale

# -- Intraday Pre-Filter Refresh (v6.18 + v6.27) --
pre_filter_intraday_enabled: true       # Enable intraday scheduled refresh
pre_filter_intraday_schedule: [10, 13, 15]  # Hours to refresh: 10:xx, 13:xx, 15:xx
pre_filter_intraday_minute: 45          # Minute of each scheduled hour (10:45, 13:45, 15:45)
# Schedule rationale:
#   10:45 → 15 min before Midday window (11:00-14:00): removes gap-ups, adds new dips
#   13:45 → 15 min before Afternoon push (14:00-15:30): fresh RSI + momentum
#   15:45 → Pre-close pool update: fresh pool ready for next morning gap-scanner
pre_filter_on_demand_enabled: true      # Enable on-demand refresh (low pool)

# -- PED Strategy (Pre-Earnings Drift v1.0) --
# Backtest (signal_outcomes, 2023-2026): D-4/D-5 buy → D-1 exit via EARNINGS_AUTO_SELL
# Win rate: 88-100% | Avg5d: +8-11% | ~2-4 trades/month
# Exit: EARNINGS_AUTO_SELL in _check_position() (days_until ∈ {0,1}) — no new exit code needed
ped_enabled: true
ped_scan_hour: 9
ped_scan_minute: 35
ped_max_positions: 1              # Dedicated slot (not counted in DIP limit)
ped_position_size_pct: 30.0       # Consistent with OVN/PEM sizing
ped_days_before_min: 5            # v6.58: D-4 WR3d=38% (bad at PED exit), D-5 only
ped_days_before_max: 5            # Buy at exactly D-5 before earnings
ped_rsi_min: 35.0                 # Avoid oversold
ped_rsi_max: 65.0                 # Avoid overbought
ped_volume_ratio_min: 0.8         # Normal volume (no unusual selling)
ped_max_slippage_pct: 1.5         # v6.55: Cancel if live price < signal price by >1.5% (gap-down filter)

# =============================================================================
# v6.32 — BETA/VOLATILITY FILTER (Test Mode)
# =============================================================================
# Prevents buying slow-moving defensive stocks unsuitable for swing trading
# Example: KHC (beta 0.047, ATR 3.19%) scored 150 but too slow for rapid rotation

beta_filter_enabled: true           # Enable beta/volatility filter
beta_filter_log_only: true          # TEST MODE: Log only, don't reject (set false to enforce)
beta_filter_min_beta: 0.5           # Minimum beta for entry (0.5 = moderate volatility)
beta_filter_min_atr_pct: 3.0        # Minimum ATR% for entry (lowered from 5.0 to match actual trades)
beta_filter_bypass_core: false       # Bypass check for CORE_STOCKS (manually curated)
pre_filter_on_demand_min_pool: 200      # Refresh if pool < 200 stocks
pre_filter_on_demand_zero_signals: 3    # Refresh if 0 signals for N scans
pre_filter_max_per_day: 6               # Max pre-filters per day (safety)

# -- Pre-Filter Quality (v6.5) --
pre_filter_max_rsi: 70             # v6.27: Relaxed 65→70 to reach target pool 200-300
pre_filter_min_dollar_volume: 5000000  # $5M avg dollar volume (liquidity)
pre_filter_min_dip_5d: 99.0        # Disabled (screener handles dip detection)
pre_filter_max_dip_5d: -15.0       # But not crashed > 15% (safety)
