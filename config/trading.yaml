# =============================================================================
# RAPID TRADER CONFIGURATION v6.2.0 — STOCK QUALITY FILTERS
# =============================================================================
# Edit this file to change trading parameters without modifying code.
# Changes are loaded on engine start. Use /api/config/reload for hot-reload.
#
# IMPORTANT: Do not commit this file with production API keys!
# =============================================================================

# =============================================================================
# RAPID ROTATION STRATEGY — UNIFIED CONFIGURATION (v6.7)
# =============================================================================
# Single source of truth for core Rapid Rotation strategy parameters.
# Components load this section via RapidRotationConfig.from_yaml()
# =============================================================================

rapid_rotation:
  # -- Stop Loss / Take Profit --
  atr_sl_multiplier: 1.5      # SL = 1.5 × ATR
  atr_tp_multiplier: 3.0      # TP = 3 × ATR (note: existing config uses 3.5)
  min_sl_pct: 2.5             # Minimum SL% (tightest allowed)
  max_sl_pct: 3.5             # Maximum SL% (widest allowed - user requested)
  min_tp_pct: 4.5             # Minimum TP% (must be > max_sl_pct)
  max_tp_pct: 8.0             # Maximum TP% (longest allowed)
  default_sl_pct: 2.5         # Default SL if ATR fails
  default_tp_pct: 5.0         # Default TP if ATR fails

  # -- Trailing Stop --
  trail_activation_pct: 3.0   # Activate trailing at +3% gain
  trail_lock_pct: 80.0        # Lock 80% of peak gains (note: existing uses 75%)

  # -- Position Management --
  max_positions: 5            # Max concurrent positions (note: existing uses 3)
  max_hold_days: 5            # Max days to hold (note: existing uses 10)
  position_size_pct: 1.0      # Position size (% of equity)
  max_position_pct: 10.0      # Max position size (% of equity)

  # -- Scoring & Filtering --
  min_score: 85               # Minimum score to qualify (note: existing uses 90)
  min_atr_pct: 2.5            # Minimum volatility (ATR%)

  # -- Regime Filtering --
  regime_filter_enabled: true # Enable SPY regime filter
  regime_sma_period: 20       # SMA period for regime check

  # -- Sector Scoring --
  sector_bull_threshold: 3.0  # > +3% = BULL sector
  sector_bear_threshold: -3.0 # < -3% = BEAR sector
  sector_bull_bonus: 0        # Bonus points for BULL sector (disabled)
  sector_bear_penalty: 0      # Penalty for BEAR sector (disabled)
  sector_sideways_adj: 0      # Adjustment for SIDEWAYS sector

  # -- Alternative Data --
  alt_data_max_bonus: 15      # Max bonus from alt data
  alt_data_max_penalty: -15   # Max penalty from alt data

  # -- Safety & Risk Management --
  daily_loss_limit_pct: 5.0   # Daily loss limit (% of equity, note: existing uses 3.0)
  min_buying_power_pct: 10.0  # Min buying power to keep (%)

  # -- PDT Settings --
  pdt_account_threshold: 25000.0  # PDT threshold ($)
  pdt_day_trade_limit: 3          # Max day trades (non-PDT)
  pdt_reserve: 1                  # Keep N day trades for emergencies (v6.10.1)
  pdt_enforce_always: false       # Testing: Don't enforce PDT (but still display count)

  # -- Circuit Breaker --
  max_consecutive_losses: 5       # Circuit breaker trigger (note: existing uses 3)
  circuit_breaker_pause_hours: 1  # Pause duration after breaker

  # -- Market Hours --
  market_open_hour: 9         # Market open hour (ET)
  market_open_minute: 30      # Market open minute
  market_close_hour: 16       # Market close hour (ET)
  market_close_minute: 0      # Market close minute
  pre_close_minute: 50        # Pre-close check (15:50 ET)

  # -- 3-Layer Entry Protection (v6.17) --
  entry_protection_enabled: true           # Master switch for entry protection
  entry_block_minutes_after_open: 15       # Layer 1: Block first 15 min after open
  entry_allow_discount_exception: true     # Allow if price drops 0.5% from signal
  entry_discount_exception_pct: -0.5       # Exception threshold
  entry_vwap_max_distance_pct: 1.5         # Layer 2: Block if > 1.5% above VWAP
  entry_vwap_allow_below: true             # Always allow if below VWAP
  entry_limit_order_only: true             # Layer 3: Use limit orders only
  entry_max_chase_pct: 0.2                 # Max chase above signal price
  entry_limit_timeout_minutes: 5           # Cancel limit order after timeout
  entry_track_rejections: true             # Track rejection statistics

  # -- Cache Settings --
  sector_cache_ttl_days: 3    # Sector cache TTL (days)
  price_cache_ttl_seconds: 300 # Price cache TTL (seconds)

# =============================================================================
# LEGACY SETTINGS (v6.2.0 and earlier)
# =============================================================================
# These settings are kept for backward compatibility with existing features.
# New code should use the rapid_rotation section above.
# =============================================================================

# -- Position Management --
max_positions: 3
position_size_pct: 40          # v4.9.4: 30→40 (base size for conviction B)
simulated_capital: 4000        # Set to null for real Alpaca account value

# -- Risk-Parity Sizing (v4.9) --
risk_parity_enabled: true
risk_budget_pct: 1.0           # Max risk per position = 1% of account
max_position_pct: 50           # v4.9.4: 40→50 (allow A+ conviction)

# -- ATR-based SL/TP (v4.6) -- v6.10: Updated to new naming
atr_sl_multiplier: 1.5        # SL = 1.5 x ATR%
min_sl_pct: 2.5               # Floor: at least 2.5% SL
max_sl_pct: 3.5               # Cap: max 3.5% SL (user requested)
atr_tp_multiplier: 3.0        # v6.10: Use same as rapid_rotation (3.0 not 3.5)
min_tp_pct: 4.5               # v6.17: Tighter TP floor (must be > max_sl_pct=3.5)
max_tp_pct: 8.0               # v6.0: 12→8 (trailing captures gains)

# -- Fallback fixed SL/TP -- v6.10: Updated to new naming
default_sl_pct: 2.5
default_tp_pct: 5.0           # v6.10: Use same as rapid_rotation (5.0 not 8.0)
pdt_tp_threshold: 4.0

# -- Trailing Stop --
trail_enabled: true           # v6.0: ENABLED (backtest: +2%/60% optimal)
trail_activation_pct: 3.0     # v6.1: 2→3 (more room to run before trailing)
trail_lock_pct: 75            # v6.1: 60→75 (lock 75% of gains)
max_hold_days: 10             # v6.0: 5→10 (more time for trade)

# -- Risk Limits --
daily_loss_limit_pct: 3.0
weekly_loss_limit_pct: 7.0
max_consecutive_losses: 3
min_score: 90                  # v6.2: 95→90 (backtest: 71% WR vs 46% for <90)

# -- Stock Quality Filters (v6.2) --
max_rsi_entry: 65              # Block RSI > 65 (backtest: only 20% WR)
avoid_mom_range: [10, 12]      # Skip momentum 10-12% (backtest: 33% WR)

# -- Signal Queue (v4.1) --
queue_enabled: true
queue_atr_mult: 0.5
queue_min_deviation: 0.5
queue_max_deviation: 1.5
queue_max_size: 3
queue_freshness_window: 30     # minutes
queue_rescan_on_empty: true

# -- Sector Diversification (v4.7) --
sector_filter_enabled: true
max_per_sector: 2
sector_loss_tracking_enabled: true
max_sector_consecutive_loss: 2
sector_cooldown_days: 2

# -- Smart Order (v4.8) --
smart_order_enabled: true
smart_order_max_spread_pct: 1.0
smart_order_wait_seconds: 30

# -- Gap Filter (v4.3) --
gap_filter_enabled: true
gap_max_up: 2.0
gap_max_down: -5.0

# -- Earnings Filter (v4.4) --
earnings_filter_enabled: true
earnings_skip_days_before: 5
earnings_skip_days_after: 0
earnings_no_data_action: warn  # allow, skip, warn
earnings_auto_sell: true       # Auto-sell before earnings
earnings_auto_sell_buffer_min: 30  # Minutes before close

# -- Low Risk Mode (v4.5) --
low_risk_mode_enabled: true
low_risk_gap_max_up: 1.0       # % - gap filter for low risk mode
low_risk_min_score: 90         # v4.9.7: 85→90 (balance: stricter than BEAR=85, looser than NORMAL=95)
low_risk_position_size_pct: 20
low_risk_max_atr_pct: 4.0

# -- Afternoon Scan (v4.9.1) --
afternoon_scan_enabled: true
afternoon_scan_hour: 14
afternoon_scan_minute: 0
afternoon_min_score: 87        # v5.4: 82→87 (stricter than min_score=85)
afternoon_gap_max_up: 1.5      # tighter than morning
afternoon_gap_max_down: -3.0   # tighter than morning

# -- Market Hours (v6.4 Single Source of Truth) --
market_open_minutes: 570                   # 09:30 ET = 9*60+30
market_close_minutes: 960                  # 16:00 ET = 16*60

# -- Session Timeline (v6.4 Single Source of Truth) --
# UI timeline bar uses these values. All times in minutes from midnight.
sessions:
  morning:
    start: 575                             # 09:35 ET
    end: 660                               # 11:00 ET
    interval: 3                            # Volatile: scan every 3 min
    label: "Morning"
  midday:
    start: 660                             # 11:00 ET
    end: 840                               # 14:00 ET
    interval: 5                            # Normal: scan every 5 min
    label: "Midday"
  afternoon:
    start: 840                             # 14:00 ET
    end: 930                               # 15:30 ET
    interval: 5
    label: "Afternoon"
  preclose:
    start: 930                             # 15:30 ET
    end: 960                               # 16:00 ET
    interval: 0                            # No continuous scan
    label: "Pre-Close"

# -- Continuous Scan (v6.3) --
continuous_scan_enabled: true  # v6.17: RE-ENABLED after fixing WebSocket leak
continuous_scan_interval_minutes: 10       # v6.17: Slower (was 5) to reduce load
continuous_scan_volatile_interval: 5       # v6.17: Slower (was 3) to reduce load
continuous_scan_volatile_end_hour: 11      # Volatile period ends at 11:00
continuous_scan_midday_hour: 12            # Switch to afternoon params after this hour

# -- Dynamic Scan (v6.18) --
continuous_scan_dynamic_enabled: true      # Enable VIX-based dynamic interval
continuous_scan_vix_threshold: 20.0        # VIX > 20 = volatile → 5 min, VIX < 20 = calm → 10 min
continuous_scan_dynamic_volatile_interval: 5    # Interval when VIX > threshold
continuous_scan_dynamic_calm_interval: 5        # Interval when VIX < threshold (user requested: always 5 min)

# -- Late Start Protection (v4.4) --
late_start_protection: true
market_open_scan_delay: 5      # minutes after open before scanning
market_open_scan_window: 20    # minutes - skip scan if started after this

# -- Monitor interval --
monitor_interval_seconds: 15

# -- Circuit breaker --
circuit_breaker_max_errors: 5

# -- Slippage tracking --
max_slippage_pct: 0.5

# -- Market Regime Filter (v4.9) --
regime_filter_enabled: true
regime_sma_period: 20
regime_rsi_min: 40
regime_return_5d_min: -2.0
regime_vix_max: 30.0               # v6.0: 100→30 (CRITICAL: VIX<30 filter = BEAR survival +109%)
skip_before_holiday: true          # v4.7: Skip new positions before long weekends/holidays

# -- BEAR Mode Params (v4.9.4: relaxed — conviction sizing handles risk) --
bear_mode_enabled: true
bear_max_positions: 2
bear_min_score: 85                 # v4.9.4: 98→85
bear_gap_max_up: 1.5               # v4.9.4: 1.0→1.5
bear_gap_max_down: -3.0            # v4.9.4: -2.0→-3.0
bear_position_size_pct: 25         # v4.9.4: 20→25
bear_max_atr_pct: 4.0              # v4.9.4: 3.0→4.0

# -- BULL Sector Filter (v4.9.3) --
bull_sector_filter_enabled: true
bull_sector_min_return: -5         # Block sector if return_20d < -5%

# -- Quant Research Findings (v5.3) --
stock_d_filter_enabled: true       # Require dip-bounce pattern
bear_dd_control_exempt: true       # Don't apply DD controls in BEAR

# =============================================================================
# v4.9.4 — AGGRESSIVE SWING MODE
# =============================================================================

# -- Conviction-Based Sizing (Step 2) --
conviction_sizing_enabled: true
conviction_a_plus_pct: 45      # STRONG BULL + insider + score 85+
conviction_a_pct: 40           # BULL + score 80+
conviction_b_pct: 30           # SIDEWAYS + score 80+

# -- Smart Day Trade (Step 3) --
smart_day_trade_enabled: true
day_trade_gap_threshold: 3.0   # % gap up at open to trigger day trade sell
day_trade_momentum_threshold: 4.0  # % intraday gain to trigger
day_trade_emergency_enabled: true   # use day trade for emergency SL

# -- Overnight Gap Scanner (Step 6) --
overnight_gap_enabled: true
overnight_gap_scan_hour: 15
overnight_gap_scan_minute: 30
overnight_gap_min_score: 70
overnight_gap_position_pct: 35
overnight_gap_target_pct: 3.0
overnight_gap_sl_pct: 1.5

# -- Breakout Scanner (Step 7) --
breakout_scan_enabled: true
breakout_min_volume_mult: 1.5
breakout_min_score: 75
breakout_target_pct: 8.0
breakout_sl_pct: 3.0

# =============================================================================
# v6.2 — PRE-FILTER SYSTEM
# =============================================================================
# Scans full universe (~1,000+ stocks) during market close hours
# to create filtered pool (~200-400 stocks) for fast realtime scanning.

# -- Pre-Filter Settings --
pre_filter_enabled: true
pre_filter_min_price: 5.0          # Minimum stock price
pre_filter_min_volume: 500000      # Minimum average volume (fallback)
pre_filter_min_atr_pct: 2.5        # Minimum ATR% (volatility)
pre_filter_max_overextended: 10.0  # Max % above SMA20
pre_filter_pool_stale_hours: 12    # Hours before pool considered stale

# -- Intraday Pre-Filter Refresh (v6.18) --
pre_filter_intraday_enabled: true       # Enable intraday refresh
pre_filter_intraday_schedule: [11, 13]  # Hours to refresh (ET): 11:00, 13:00
pre_filter_on_demand_enabled: true      # Enable on-demand refresh
pre_filter_on_demand_min_pool: 200      # Refresh if pool < 200 stocks
pre_filter_on_demand_zero_signals: 3    # Refresh if 0 signals for N scans
pre_filter_max_per_day: 6               # Max pre-filters per day (safety)

# -- Pre-Filter Quality (v6.5) --
pre_filter_max_rsi: 65             # Filter overbought (RSI > 65 = 20% WR)
pre_filter_min_dollar_volume: 5000000  # $5M avg dollar volume (liquidity)
pre_filter_min_dip_5d: 99.0        # Disabled (screener handles dip detection)
pre_filter_max_dip_5d: -15.0       # But not crashed > 15% (safety)
